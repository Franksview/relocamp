<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf8f4"/>
      <stop offset="100%" stop-color="#f5f0e8"/>
    </linearGradient>
    <linearGradient id="arc1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d6b5e"/>
      <stop offset="100%" stop-color="#e8734a"/>
    </linearGradient>
    <linearGradient id="arc2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d6b5e"/>
      <stop offset="100%" stop-color="#4a7fa5"/>
    </linearGradient>
    <linearGradient id="arc3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d6b5e"/>
      <stop offset="100%" stop-color="#f5b731"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle map grid -->
  <g opacity="0.06" stroke="#3d6b5e" stroke-width="1" fill="none">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Route arcs (decorative) -->
  <g fill="none" stroke-width="3" stroke-linecap="round">
    <!-- Arc 1: left to upper right -->
    <path d="M 300 350 Q 550 150 850 220" stroke="url(#arc1)" opacity="0.5"/>
    <!-- Arc 2: left to lower right -->
    <path d="M 300 350 Q 600 500 900 380" stroke="url(#arc2)" opacity="0.4"/>
    <!-- Arc 3: left to far right -->
    <path d="M 300 350 Q 650 200 1000 300" stroke="url(#arc3)" opacity="0.35"/>
    <!-- Arc 4: shorter -->
    <path d="M 300 350 Q 400 250 550 280" stroke="#3d6b5e" opacity="0.3"/>
    <!-- Arc 5 -->
    <path d="M 300 350 Q 500 420 700 350" stroke="#e8734a" opacity="0.3"/>
  </g>

  <!-- City dots -->
  <g>
    <!-- Origin (large) -->
    <circle cx="300" cy="350" r="8" fill="#1a2332" stroke="white" stroke-width="3"/>
    <!-- Destinations -->
    <circle cx="850" cy="220" r="5" fill="#e8734a" stroke="white" stroke-width="2"/>
    <circle cx="900" cy="380" r="5" fill="#4a7fa5" stroke="white" stroke-width="2"/>
    <circle cx="1000" cy="300" r="5" fill="#f5b731" stroke="white" stroke-width="2"/>
    <circle cx="550" cy="280" r="4" fill="#3d6b5e" stroke="white" stroke-width="2"/>
    <circle cx="700" cy="350" r="4" fill="#e8734a" stroke="white" stroke-width="2"/>
  </g>

  <!-- Campervan icon -->
  <g transform="translate(270, 380)" fill="#3d6b5e" opacity="0.15">
    <rect x="0" y="0" width="60" height="30" rx="6"/>
    <rect x="-10" y="5" width="15" height="20" rx="3"/>
    <circle cx="10" cy="33" r="6"/>
    <circle cx="45" cy="33" r="6"/>
  </g>

  <!-- Logo -->
  <text x="100" y="180" font-family="Georgia, 'DM Serif Display', serif" font-size="72" fill="#1a2332" font-weight="400">
    Relo<tspan fill="#e8734a">camp</tspan>
  </text>

  <!-- Tagline -->
  <text x="105" y="230" font-family="Inter, -apple-system, sans-serif" font-size="24" fill="#64748b" font-weight="400">
    Campervan relocation deals from
  </text>
  <text x="562" y="230" font-family="Inter, -apple-system, sans-serif" font-size="24" fill="#e8734a" font-weight="700">
    €1/day
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#3d6b5e"/>
  <text x="600" y="616" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="white" font-weight="500" text-anchor="middle">
    relocamp.nl — Chain cheap campervan trips across Europe
  </text>
</svg>